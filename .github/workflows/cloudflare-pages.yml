name: Cloudflare Pages CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate Cloudflare Pages build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: npm ci

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Deploy to Cloudflare Pages
        if: github.event_name == 'push'
        run: npx wrangler pages deploy .pages-deploy --project-name evorupa --branch "${{ github.ref_name }}" --commit-hash "${{ github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          NEXT_PUBLIC_SUPABASE_URL: ${{ secrets.NEXT_PUBLIC_SUPABASE_URL }}
          NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY: ${{ secrets.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY }}

  # GitHub Actions is the source of truth for validation and deployment.
  # Cloudflare Pages' native GitHub deployments are disabled because they can
  # fail before clone/build initialization while Wrangler deploys the verified
  # .pages-deploy artifact deterministically.
