name: Cloudflare Pages CI/CD

on:
  pull_request:
    branches:
      - main
      - master
  push:
    branches:
      - main
      - master
  workflow_dispatch:

permissions:
  contents: read

jobs:
  build:
    name: Validate Cloudflare Pages build
    runs-on: ubuntu-latest

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup Node.js
        uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm

      - name: Install dependencies
        run: |
          for attempt in 1 2 3; do
            if npm ci; then
              exit 0
            fi

            if [ "$attempt" -eq 3 ]; then
              echo "::error::npm ci failed after 3 attempts"
              exit 1
            fi

            echo "npm ci failed on attempt $attempt; retrying in 15 seconds"
            sleep 15
          done

      - name: Load bundled public Supabase config
        run: |
          node <<'NODE'
          const fs = require('node:fs')
          const path = require('node:path')

          const configPath = path.resolve('lib', 'supabase-public-config.json')
          const config = JSON.parse(fs.readFileSync(configPath, 'utf8'))

          fs.appendFileSync(process.env.GITHUB_ENV, `NEXT_PUBLIC_SUPABASE_URL=${config.url}\n`)
          fs.appendFileSync(process.env.GITHUB_ENV, `NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY=${config.publishableKey}\n`)
          NODE

      - name: Type check
        run: npm run type-check

      - name: Lint
        run: npm run lint

      - name: Test
        run: npm run test

      - name: Build for Cloudflare Pages
        run: npm run build:pages

      - name: Validate Cloudflare deploy secrets
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
        run: |
          test -n "$CLOUDFLARE_ACCOUNT_ID" || { echo "::error::Missing CLOUDFLARE_ACCOUNT_ID GitHub secret"; exit 1; }
          test -n "$CLOUDFLARE_API_TOKEN" || { echo "::error::Missing CLOUDFLARE_API_TOKEN GitHub secret"; exit 1; }

      - name: Deploy primary Cloudflare Pages project
        if: github.event_name == 'push'
        run: npx wrangler pages deploy .pages-deploy --project-name evorupa --branch "${{ github.ref_name }}" --commit-hash "${{ github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Deploy legacy Cloudflare Pages project
        if: github.event_name == 'push'
        run: npx wrangler pages deploy .pages-deploy --project-name gderupa --branch "${{ github.ref_name }}" --commit-hash "${{ github.sha }}"
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}

      - name: Verify Cloudflare Pages deployment
        if: github.event_name == 'push'
        env:
          CLOUDFLARE_ACCOUNT_ID: ${{ secrets.CLOUDFLARE_ACCOUNT_ID }}
          CLOUDFLARE_API_TOKEN: ${{ secrets.CLOUDFLARE_API_TOKEN }}
          GITHUB_SHA: ${{ github.sha }}
        run: |
          node <<'NODE'
          const accountId = process.env.CLOUDFLARE_ACCOUNT_ID
          const apiToken = process.env.CLOUDFLARE_API_TOKEN
          const expectedSha = process.env.GITHUB_SHA
          const supabaseUrl = process.env.NEXT_PUBLIC_SUPABASE_URL
          const supabaseKey = process.env.NEXT_PUBLIC_SUPABASE_PUBLISHABLE_KEY

          const cfHeaders = { Authorization: `Bearer ${apiToken}` }
          const projects = [
            { name: 'evorupa', productionUrl: 'https://evorupa.pages.dev' },
            { name: 'gderupa', productionUrl: 'https://gderupa.pages.dev' },
          ]

          async function sleep(ms) {
            await new Promise((resolve) => setTimeout(resolve, ms))
          }

          async function getDeployment(projectName) {
            const deploymentsUrl = `https://api.cloudflare.com/client/v4/accounts/${accountId}/pages/projects/${projectName}/deployments`
            const response = await fetch(deploymentsUrl, { headers: cfHeaders })
            if (!response.ok) {
              throw new Error(`Cloudflare deployments request failed for ${projectName}: ${response.status}`)
            }

            const payload = await response.json()
            if (!payload.success) {
              throw new Error(`Cloudflare deployments API failed for ${projectName}: ${JSON.stringify(payload.errors)}`)
            }

            return payload.result.find(
              (deployment) => deployment.deployment_trigger?.metadata?.commit_hash === expectedSha,
            )
          }

          async function fetchOkWithRetry(url) {
            let lastStatus = 'no response'

            for (let attempt = 1; attempt <= 12; attempt += 1) {
              try {
                const response = await fetch(url)
                lastStatus = `HTTP ${response.status}`

                if (response.ok) {
                  return response
                }
              } catch (error) {
                lastStatus = error instanceof Error ? error.message : String(error)
              }

              await sleep(5000)
            }

            throw new Error(`${url} was not reachable after retries: ${lastStatus}`)
          }

          async function verifyProject(project) {
            let deployment = null
            for (let attempt = 1; attempt <= 12; attempt += 1) {
              deployment = await getDeployment(project.name)
              const status = deployment?.latest_stage?.status
              if (status === 'success') {
                break
              }

              if (status === 'failure') {
                throw new Error(`Cloudflare deployment for ${project.name} at ${expectedSha} failed`)
              }

              await sleep(5000)
            }

            if (!deployment || deployment.latest_stage?.status !== 'success') {
              throw new Error(`Cloudflare deployment for ${project.name} at ${expectedSha} did not become successful`)
            }

            for (const url of [deployment.url, project.productionUrl]) {
              await fetchOkWithRetry(url)
            }

            console.log(`Verified Cloudflare deployment ${deployment.id} for ${project.name} at ${expectedSha}`)
            return deployment
          }

          const deployments = []
          for (const project of projects) {
            deployments.push(await verifyProject(project))
          }

          const reportsResponse = await fetch(`${supabaseUrl}/rest/v1/reports?select=id&limit=1`, {
            headers: {
              apikey: supabaseKey,
              Authorization: `Bearer ${supabaseKey}`,
              Prefer: 'count=exact',
              Range: '0-0',
            },
          })

          if (!reportsResponse.ok) {
            throw new Error(`Supabase reports smoke failed: HTTP ${reportsResponse.status}`)
          }

          const contentRange = reportsResponse.headers.get('content-range') ?? ''
          const reportCount = Number(contentRange.split('/')[1] ?? 0)
          if (!Number.isFinite(reportCount) || reportCount <= 0) {
            throw new Error(`Supabase reports smoke returned invalid count: ${contentRange}`)
          }

          for (const project of projects) {
            const homeResponse = await fetchOkWithRetry(project.productionUrl)
            const homeHtml = await homeResponse.text()
            const renderedCount = Number(
              homeHtml.match(/Ukupno prijava<\/p><p[^>]*>(\d+)/)?.[1] ?? 0,
            )
            if (renderedCount <= 0) {
              throw new Error(`${project.productionUrl} rendered zero reports after successful Supabase smoke`)
            }

            console.log(`${project.name} rendered home count: ${renderedCount}`)
          }

          console.log(`Supabase reports count: ${reportCount}; verified deployments: ${deployments.length}`)
          NODE

  # GitHub Actions is the source of truth for validation and deployment.
  # Cloudflare Pages' native GitHub deployments are disabled because they can
  # fail before clone/build initialization while Wrangler deploys the verified
  # .pages-deploy artifact deterministically.
