name: "Copilot Auto-Reactions for Trusted Users"

# Trigger Copilot coding agent automatically when a trusted user interacts
# with issues or pull requests.
#
# Trusted users: Antiokh
#
# Supported triggers:
#   Issues  – opened by a trusted user, or a trusted user comments `/fix`
#   PRs     – opened by a trusted user, or a trusted user comments `/approve`

on:
  issues:
    types: [opened]
  issue_comment:
    types: [created]
  pull_request:
    types: [opened]

jobs:
  # ── Auto-assign issues to Copilot ──────────────────────────────────────────
  # Fires when a trusted user opens an issue OR comments `/fix` on any issue.
  copilot-auto-fix:
    name: "Auto-assign issue to Copilot"
    runs-on: ubuntu-latest
    if: |
      github.actor == 'Antiokh' && (
        github.event_name == 'issues' ||
        (github.event_name == 'issue_comment' && contains(github.event.comment.body, '/fix'))
      )
    permissions:
      issues: write
    steps:
      - name: Assign issue to Copilot
        uses: actions/github-script@v7
        with:
          script: |
            const issue_number = context.issue.number;
            // Add the "copilot" label so the coding agent picks it up
            await github.rest.issues.addLabels({
              owner: context.repo.owner,
              repo: context.repo.repo,
              issue_number,
              labels: ['copilot'],
            });
            console.log(`Issue #${issue_number} labeled for Copilot by trusted user ${context.actor}`);

  # ── Auto-approve PRs opened by trusted users ───────────────────────────────
  # Fires when a trusted user opens a PR. Branch protection rules should enforce
  # required status checks before the approval can be used to merge.
  copilot-auto-approve:
    name: "Auto-approve PR from trusted user"
    runs-on: ubuntu-latest
    if: |
      github.actor == 'Antiokh' &&
      github.event_name == 'pull_request' &&
      github.event.action == 'opened' &&
      github.event.pull_request.user.login == 'Antiokh'
    permissions:
      pull-requests: write
    steps:
      - name: Approve pull request
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.payload.pull_request.number;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              event: 'APPROVE',
              body: 'Auto-approved by Copilot reactions workflow (trusted user: ' + context.actor + ').',
            });
            console.log(`PR #${pr_number} auto-approved for trusted user ${context.actor}`);

  # ── Handle /approve comment on PRs ─────────────────────────────────────────
  # Only approves PRs that were opened by the same trusted user to prevent
  # bypassing review requirements on PRs from other contributors.
  copilot-comment-approve:
    name: "Auto-approve PR on /approve comment"
    runs-on: ubuntu-latest
    if: |
      github.actor == 'Antiokh' &&
      github.event_name == 'issue_comment' &&
      contains(github.event.comment.body, '/approve') &&
      github.event.issue.pull_request != null &&
      github.event.issue.user.login == 'Antiokh'
    permissions:
      pull-requests: write
    steps:
      - name: Approve pull request via comment trigger
        uses: actions/github-script@v7
        with:
          script: |
            const pr_number = context.issue.number;
            await github.rest.pulls.createReview({
              owner: context.repo.owner,
              repo: context.repo.repo,
              pull_number: pr_number,
              event: 'APPROVE',
              body: 'Auto-approved by Copilot reactions workflow (trusted user: ' + context.actor + ').',
            });
            console.log(`PR #${pr_number} auto-approved via /approve comment by trusted user ${context.actor}`);
